name: CI Pipeline

on:
  push:
    branches: ['main','master']
  pull_request:
    branches: ['main','master']


jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
     - name: Checkout Code
       uses: actions/checkout@v4

     - name: Setup Node.js
       uses: actions/setup-node@v4
       with:
         node-version: '20'

     - name: Install Dependencies
       run: npm install 

     - name: Run Linter
       run: npm run lint

     - name: Build Project
       run: npm run build